id: T10
title: Port 2 — kmsg fd snoop observer
objective: |
  Add in-init observability: discover init's kmsg fds, persist them in
  HookHandle, and add an observe-init syscall-trace snoop that dumps
  write(kmsg_fd, ...) buffers. Wire --observe-init in the CLI parser.
deliverables:
  - new seal/kmsg_observer.rs (discover_kmsg_fds, snoop_kmsg_writes_for_duration)
  - "seal/mod.rs: pub mod kmsg_observer; added"
  - "kmsg_fds: Vec<u64> field on HookHandle, populated in install_init_hook before Ok return"
  - --observe-init [--duration] flag in the hand-rolled CLI parser (no clap)
acceptance:
  - "cargo test -p resetprop passes incl. discover_kmsg_fds against a synthetic /proc/<pid>/fd/ fixture"
  - "on-device positive trigger: setprop persist.pv.kmsg-probe-<rand> while observe-init runs captures >=1 kmsg line in the window (a bare exit-0-no-output run does NOT pass)"
  - "cargo clippy -p resetprop -- -D warnings is clean"
