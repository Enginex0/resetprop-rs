id: T18
title: M4/M3/L4 — shared libc-row helper + safety-comment + doc-rot cleanups
objective: |
  Three low-risk correctness/clarity fixes from the audit. M4: two divergent
  predicates pick libc.text (arena uses starts_with("r-x") + libc.so or
  libc.so.*; hook uses exact "r-xp" + "/libc.so"); only hook got the
  hardening. M3: the lock_list_append_bytes capacity-check rationale cites
  "the hook body at HOOK_BODY_OFFSET", but after the file-backed split
  (563e6a3) the body lives on a DIFFERENT page than the lock list, so the
  stated reason is a fossil and nothing ties the constants together. L4:
  doc-rot in mod.rs and arena.rs.
deliverables:
  - "one find_libc_text_row helper used by both arena.rs and hook.rs, using hook.rs's hardened exact-match form (r-xp + path ends_with /libc.so)"
  - "correct the lock_list_append_bytes capacity comment and add `const _: () = assert!(LOCK_LIST_CAPACITY < PATH_STAGE_OFFSET);` so a future capacity bump cannot let the in-init walker reach the staged path bytes"
  - "doc-rot sweep: mod.rs:3-6 (re-exports no longer deferred), arena.rs:283-289 (flow doc names remote_syscall where code calls remote_syscall_via_poke), hook.rs:418 ('4-byte sentinel' is functionally one byte)"
acceptance:
  - "cargo test -p resetprop passes; clippy clean"
  - "one libc-row predicate definition, two call sites (grep)"
  - "const-assert present; build fails if LOCK_LIST_CAPACITY >= PATH_STAGE_OFFSET"
deps: [T03]
files:
  - crates/resetprop/src/seal/hook.rs
  - crates/resetprop/src/seal/arena.rs
  - crates/resetprop/src/seal/mod.rs
refs:
  - "crates/resetprop/src/seal/hook.rs:181-188 (is_libc_row — hardened predicate to promote to the shared helper)"
  - "crates/resetprop/src/seal/arena.rs:313-323 (the looser libc match to replace)"
  - "crates/resetprop/src/seal/hook.rs:101 (LOCK_LIST_CAPACITY), :65 (PATH_STAGE_OFFSET), :81 (HOOK_BODY_OFFSET), :1253-1255 (incorrect rationale)"
  - "crates/resetprop/src/seal/hook.rs:418 ('4-byte sentinel' wording)"
  - "crates/resetprop/src/seal/mod.rs:3-6 (stale 'deferred' doc), :47-52 (the present re-exports)"
  - "crates/resetprop/src/seal/arena.rs:283-289 (flow doc naming remote_syscall)"
