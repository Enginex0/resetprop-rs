id: T16
title: H1 — independent encoding oracle for the trampoline + encoders
objective: |
  The ARM64 encoder module and HOOK_BODY_TEMPLATE are validated only against
  hand-derived golden hex, so a human encoding error confirms itself: the
  Defect-A bug (ldrb post-index #16 instead of #1, fixed in T01) passed the
  138-test gate because the test asserted the SAME wrong constant
  (0x3841_054b in both the template and its expected array). Add an oracle
  that is independent of the hand-written constants, so a transcription error
  can no longer be green.
deliverables:
  - "an independent oracle: either (a) a dev/build step that runs a real assembler (aarch64 `as` / `llvm-mc`) over the reference mnemonics and emits the golden words, or (b) a vendored golden blob produced out-of-band with a documented regeneration command"
  - "a test that diffs HOOK_BODY_TEMPLATE and the encoder-helper outputs against the oracle and fails on any divergence"
acceptance:
  - "cargo test -p resetprop passes; clippy clean"
  - "mutating any single word of HOOK_BODY_TEMPLATE makes the oracle test fail (proves independence — the oracle is not a second copy of the same constants)"
  - "the golden regeneration command is documented in-file so the oracle can be refreshed when the template legitimately changes"
deps: [T01]
files:
  - crates/resetprop/src/seal/hook.rs
refs:
  - "crates/resetprop/src/seal/hook.rs:852-888 (HOOK_BODY_TEMPLATE — 35 hand-encoded words)"
  - "crates/resetprop/src/seal/hook.rs:686-818 (encoder mod — 7 consts + ~15 helpers, all hand-derived)"
  - "crates/resetprop/src/seal/hook.rs:936-963 (build_hook_body_bytes — the patcher whose output the oracle should also cover)"
  - "crates/resetprop/src/seal/hook.rs:1554-1599 (existing opcode/self-consistency tests that share the hand-derived oracle — the gap this task fills)"
  - "crates/resetprop/src/seal/hook.rs:1875 (advance-block test whose golden was wrong before T01 — the failure mode this prevents)"
