  - "crates/resetprop/src/seal/ptrace.rs:201-237 (ptrace_seize / ptrace_interrupt — per-tid primitives to call in the loop)"
  - "crates/resetprop/src/seal/ptrace.rs:303-341 (wait_stop — per-tid group-stop wait, already __WALL)"
  - "crates/resetprop/src/seal/hook.rs:1127-1134 (the two non-atomic trampoline POKEs — the precise race window)"
  - "crates/resetprop/src/seal/hook.rs:336 (install_init_hook attach), :1112 (install_trampoline attach), :1326 (seal_prop attach), :1393 (unseal_prop attach)"
  - "crates/resetprop/src/seal/arena.rs:309 (remote_remap_private attach — Tier A is exposed too)"
