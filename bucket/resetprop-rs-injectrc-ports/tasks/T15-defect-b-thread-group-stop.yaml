id: T15
title: C1/Defect B — thread-group stop before any poke
objective: |
  Defect B (PLAN.md:54-62) is the bucket's only unfixed HIGH defect and the
  root of the bootloop hazard. RemoteAttach SEIZE+INTERRUPT only PID 1's
  leader thread; init's sibling threads keep running on other cores through
  the Tier A remap and the Tier B trampoline patch. A sibling that calls
  __system_property_update between the two non-atomic trampoline POKEs
  (hook.rs:1129 then :1132) executes `ldr x16,[pc,#8]; br x16` against a
  half-written 16 bytes and branches into a garbage target -> PID 1 dies ->
  panic/bootloop. T03/T04/T06 mitigate around this; none closes it. Fix:
  freeze the whole thread group before any poke and resume every thread on
  detach. This is foundational: it changes the shared RemoteAttach that both
  tiers and T03/T04 build on, so it lands before T03.
deliverables:
  - "/proc/<pid>/task/* tid enumerator (authored fresh; none exists)"
  - "RemoteAttach SEIZE+INTERRUPT+wait_stop on every tid, with a re-scan-until-stable loop so threads spawned during enumeration are also caught"
  - "detach path resumes every seized tid (preserve PLAN G2:424-425 're-detach all task threads')"
  - "per-tid ESRCH tolerance: a thread exiting mid-window is not a hard error"
  - "policy + impl for clones spawned after enumeration: PTRACE_O_TRACECLONE on the leader to intercept new threads, or a documented bounded re-scan with the residual race called out"
  - "both poke entry points run under the group stop: install_init_hook, install_trampoline, seal_prop/unseal_prop, and remote_remap_private"
acceptance:
  - "cargo test -p resetprop passes; cargo clippy -p resetprop -- -D warnings clean"
  - "host unit test: tid enumerator + re-scan-until-stable logic against a spawned multi-threaded child (the live SEIZE path stays #[cfg(target_arch=aarch64)] + #[ignore] like the existing ptrace smokes)"
  - "DEVICE (aarch64, real init): Tier B install repeated >=20 times while a concurrent property-set load generator runs; zero init crashes, zero reboots; getprop before/after consistent for sealed and unsealed names"
  - "record that L2 (lock-list write-ordering race) is closed by the full group stop, so seal_prop's ordering no longer needs a lock-free rewrite"
deps: [T01, T02]
files:
  - crates/resetprop/src/seal/ptrace.rs
  - crates/resetprop/src/seal/arena.rs
  - crates/resetprop/src/seal/hook.rs
