id: T13
title: Port 4 — multi-arch register-layout submodule + cfg facade
objective: |
  ptrace.rs is aarch64-only. Extract per-arch register layout into a
  seal/ptrace/arch/ submodule (aarch64 moved verbatim), make ptrace.rs a
  cfg-dispatched facade exporting the arch-neutral interface, and migrate
  the regs[8]/regs[0..5] literals in arena.rs. RISC-V stays a deferred stub.
deliverables:
  - "ptrace/arch/{aarch64,arm,x86_64,x86,riscv64}.rs (riscv64 deferred-stub); mod arch in ptrace.rs"
  - "each arch module exports UserPtRegs, TRAP_INSN, BRK_INSN, set_syscall_args, get_syscall_return, NT_PRSTATUS_SIZE with a per-arch size assert verified against UAPI headers"
  - ptrace.rs becomes the cfg-dispatched facade
  - arena.rs regs[8]/regs[0..5] literals migrated to the neutral interface
  - lib.rs arch cfg gate widened past aarch64-only
acceptance:
  - "cargo build --target aarch64-linux-android -p resetprop still succeeds (no regression)"
  - "cargo build -p resetprop succeeds for targets x86_64-linux-android, armv7-linux-androideabi, i686-linux-android"
  - "cargo test -p resetprop --target <each> passes the cfg-gated surface"
  - "cargo clippy -p resetprop -- -D warnings is clean"
deps: [T03, T05]
files:
  - crates/resetprop/src/seal/ptrace.rs
  - crates/resetprop/src/seal/ptrace/arch/aarch64.rs
  - crates/resetprop/src/seal/ptrace/arch/arm.rs
  - crates/resetprop/src/seal/ptrace/arch/x86_64.rs
  - crates/resetprop/src/seal/ptrace/arch/x86.rs
  - crates/resetprop/src/seal/ptrace/arch/riscv64.rs
  - crates/resetprop/src/seal/arena.rs
  - crates/resetprop/src/lib.rs
