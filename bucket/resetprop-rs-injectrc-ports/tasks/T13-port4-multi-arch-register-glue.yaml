  - "crates/resetprop/src/seal/ptrace.rs:113-126 (UserPtRegs struct + 272-byte size assert)"
  - "crates/resetprop/src/seal/ptrace.rs:535-728 (remote_syscall + remote_syscall_via_poke; the regs[8]/regs[0..5] convention to generalize)"
