id: T03
title: M1 — init-identity guard before any poke
objective: |
  Nothing verifies PID 1 is really init before patching. Before the
  RemoteAttach in both poke entry points, verify /proc/1/comm==init (no
  reader exists; author it) and the resolved libc row is the expected
  APEX libc; reject a non-init stand-in with a typed error before any write.
deliverables:
  - "/proc/1/comm (or cmdline) identity reader (authored fresh)"
  - identity + libc-row guard in install_init_hook before RemoteAttach::new
  - identity + libc-row guard in remote_remap_private before RemoteAttach::new
  - new typed Error::NotInit variant in error.rs (none exists today)
acceptance:
  - "cargo test -p resetprop passes"
  - "patching a non-init PID-1 stand-in is rejected with Error::NotInit before any write (unit test with a fake-PID-1 fixture)"
  - "cargo clippy -p resetprop -- -D warnings is clean"
deps: [T01, T02]
files:
  - crates/resetprop/src/seal/hook.rs
  - crates/resetprop/src/seal/arena.rs
  - crates/resetprop/src/error.rs
refs:
  - "crates/resetprop/src/seal/hook.rs:292-383 (install_init_hook; guard before RemoteAttach::new at :336)"
  - "crates/resetprop/src/seal/hook.rs:175-188 (is_libc_row predicate to mirror)"
  - "crates/resetprop/src/seal/arena.rs:263-324 (remote_remap_private; guard before RemoteAttach::new at :310, libc-row :313-324)"
  - "crates/resetprop/src/seal/arena.rs:183-211 (RemoteAttach::new shared entry)"
  - "crates/resetprop/src/error.rs:6-26 (Error enum; no NotInit variant; add one)"
external_refs:
  - "ReZygisk@093dfaf loader/src/ptracer/monitor.c:544-562 (claim_init_tracer seizes PID1 with NO identity check; the prior-art ABSENCE this task corrects)"
reading_estimate_k: 35
