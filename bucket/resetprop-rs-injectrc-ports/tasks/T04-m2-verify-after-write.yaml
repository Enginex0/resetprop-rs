id: T04
title: M2 — verify-after-write of the trampoline
objective: |
  After writing the 16-byte trampoline, read it back via process_vm_readv
  and compare BEFORE the i-cache sync; on mismatch revert via the existing
  revert_trampoline and abort, leaving init's prologue intact.
deliverables:
  - read-back + compare gate inserted between the trampoline word writes and the i-cache sync block
  - revert_trampoline called on mismatch, op aborts with a typed error
acceptance:
  - "cargo test -p resetprop passes"
  - "a forced torn write is detected and rolled back with init prologue intact (unit test forcing a mismatch)"
  - "cargo clippy -p resetprop -- -D warnings is clean"
deps: [T03]
files:
  - crates/resetprop/src/seal/hook.rs
refs:
  - "crates/resetprop/src/seal/hook.rs:145-173 (HookHandle incl trampoline_installed)"
  - "crates/resetprop/src/seal/hook.rs:1127-1134 (the two ptrace_poketext trampoline word writes; insert read-back here)"
  - "crates/resetprop/src/seal/hook.rs:1136-1209 (i-cache sync block; must run AFTER read-back)"
  - "crates/resetprop/src/seal/hook.rs:1038-1073 (revert_trampoline; call on mismatch)"
  - "crates/resetprop/src/seal/ptrace.rs:435-464 (read_remote process_vm_readv wrapper to call; read-only)"
  - "crates/resetprop/src/seal/ptrace.rs:398-415 (ptrace_poketext signature; read-only)"
