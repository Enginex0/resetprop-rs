id: T11
title: Port 3 — .gnu_debugdata symtab fallback in elf.rs
objective: |
  parse_libc_elf walks program headers only. Extend it with a section-header
  walk locating .gnu_debugdata, decode it (XZ, via T12), parse the nested
  mini-ELF symtab, and have resolve_symbol fall through to it on miss.
  Absence of the section is a no-op, not an error.
deliverables:
  - Elf64_Shdr types + .shstrtab section-name lookup
  - "gnu_debugdata_view: Option<DebugSymtabView> field on LibcElfView"
  - resolve_symbol falls through to debug-symtab on GNU_HASH + linear miss
acceptance:
  - "cargo test -p resetprop passes incl. a synthetic-ELF-with-embedded-.gnu_debugdata test and a no-op test for an ELF without it"
  - "resolve_symbol(__system_property_update) still resolves via GNU_HASH (no regression)"
  - "a debugdata-only symbol resolves against a fixture libc"
  - "cargo clippy -p resetprop -- -D warnings is clean"
deps: [T12]
files:
  - crates/resetprop/src/seal/elf.rs
refs:
  - "crates/resetprop/src/seal/elf.rs:249-381 (parse_libc_elf; extend with shdr walk)"
  - "crates/resetprop/src/seal/elf.rs:172-185 (LibcElfView; add debug-symtab view)"
  - "crates/resetprop/src/seal/elf.rs:622-629 (resolve_symbol dispatcher; add fallback)"
  - "crates/resetprop/src/seal/elf.rs:93-112 (Elf64_Ehdr; e_shoff at :103)"
  - "crates/resetprop/src/seal/elf.rs:215-232 (read_struct checked_add bounds pattern to mirror)"
  - "crates/resetprop/src/seal/elf.rs:574-609 (linear_lookup; existing fallback model the debugdata path reuses)"
external_refs:
  - "injectrc@c3fb624 init_injector/payload.cpp:21-24 (mangled symbol names motivating the fallback)"
  - "injectrc@c3fb624 init_injector/payload.cpp:111-114 (FIND_SYM call-sites)"
