# Casting-plane Rust supply gate (enforcement.md: license allowlist + advisories,
# the cargo-deny half of the polyglot supply line). cargo-deny 0.19.x schema.
# Widening the allowlist is an ADR plus a canary promotion, not a silent edit.

[graph]
all-features = true

[licenses]
# Allowlist only: a crate whose license is not listed here fails the build.
# This is the deterministic "unlicensed/disallowed crate -> bump" gate.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9
# First-party workspace crates (publish = false) are your own source, not a
# supply-line dependency: gate the licenses of what you pull IN, not what you
# write. Unpublished crates are skipped; an external crate is still gated.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace path/git deps legitimately carry no version; exempt them so only
# EXTERNAL wildcard requirements (the real supply risk) fail the ban.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# [advisories] is intentionally minimal: the RustSec advisory DB is a fetched
# feed (network, like OWASP dependency-check's NVD feed). The license + bans +
# sources checks above are fully offline and deterministic.
[advisories]
yanked = "deny"
